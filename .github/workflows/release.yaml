name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - run: npm ci
      - run: npm run build

      - name: Package dist
        run: tar -czf dist.tar.gz dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.tar.gz
